<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>部门中途旅游 · 成都 / 广西 / 泉州</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #f6f3ec; }
    .city-switcher { position: fixed; top: 18px; left: 18px; z-index: 100; display: inline-flex; gap: 5px; padding: 5px; background: rgba(255,253,250,.9); border: 1px solid rgba(255,255,255,.8); border-radius: 999px; box-shadow: 0 8px 24px rgba(22,55,39,.18); backdrop-filter: blur(12px); }
    .city-switcher button { border: 0; padding: 8px 14px; color: #52645a; background: transparent; border-radius: 999px; font: 600 13px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; cursor: pointer; transition: .2s ease; }
    .city-switcher button:hover { transform: translateY(-1px); }
    .city-switcher button.active { color: #fff; background: #2d6663; box-shadow: 0 4px 10px rgba(45,102,99,.22); }
    .city-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #f6f3ec; }
    .city-frame[hidden] { display: none; }
    @media (max-width: 600px) { .city-switcher { top: 10px; left: 10px; } .city-switcher button { padding: 7px 11px; font-size: 12px; } }
  </style>
</head>
<body>
  <nav class="city-switcher" aria-label="城市方案切换">
    <button type="button" class="active" data-city="chengdu">成都方案</button>
    <button type="button" data-city="guangxi">广西方案</button>
    <button type="button" data-city="quanzhou">泉州方案</button>
  </nav>
  <iframe class="city-frame" id="chengduFrame" title="成都方案" src="chengdu.html" data-loaded="1"></iframe>
  <iframe class="city-frame" id="guangxiFrame" title="广西方案" data-src="guangxi.html" hidden></iframe>
  <iframe class="city-frame" id="quanzhouFrame" title="泉州方案" data-src="quanzhou.html" hidden></iframe>
  <script>
    (() => {
      const frames = {
        chengdu: document.getElementById('chengduFrame'),
        guangxi: document.getElementById('guangxiFrame'),
        quanzhou: document.getElementById('quanzhouFrame')
      };
      const buttons = [...document.querySelectorAll('[data-city]')];
      const show = (city) => {
        const frame = frames[city];
        if (frame.dataset.src && !frame.dataset.loaded) {
          frame.src = frame.dataset.src;
          frame.dataset.loaded = '1';
        }
        Object.entries(frames).forEach(([key, frame]) => { frame.hidden = key !== city; });
        buttons.forEach((button) => button.classList.toggle('active', button.dataset.city === city));
        try { localStorage.setItem('midway-city', city); } catch (_) {}
      };
      let saved = 'chengdu';
      try { saved = localStorage.getItem('midway-city') || saved; } catch (_) {}
      buttons.forEach((button) => button.addEventListener('click', () => show(button.dataset.city)));
      show(frames[saved] ? saved : 'chengdu');
    })();
  </script>
</body>
</html>
